services:
  command_bot:
    build: .
    command: >
      uv run python main.py
    container_name: command_bot
    env_file:
      - .env
    networks:
      - backend
    depends_on:
      tokens_db:
        condition: service_healthy

  tokens_db:
    image: redis:alpine
    container_name: tokens_db
    restart: always
    ports:
      - "6379:6379"
    env_file:
      - .env
    command: >
      redis-server 
      --requirepass $REDIS_PASSWORD
      --appendonly yes
    volumes:
      - ./redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$REDIS_PASSWORD", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - backend

networks:
  backend:
    driver: bridge